<!-- New Agent Registration -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Files | New Agent Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="register-box">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div class="text-center mb-10">
            <div class="w-12 h-12 border border-cyan-500/40 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-6 h-6 fill-cyan-400" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            <h2 class="text-2xl font-bold text-white tracking-[0.2em] uppercase mb-2">New Agent Registration</h2>
            <p class="text-[9px] text-zinc-500 tracking-[0.3em] uppercase">Subject Status: Unidentified // Location: Encrypted</p>
        </div>

        <div class="biometric-grid">
            <div class="scan-line"></div>
            <span class="text-[9px] tracking-[0.4em] text-cyan-400/50 uppercase">Awaiting Biometric Feed...</span>
        </div>

        <form action="#" class="space-y-6">
            <div class="input-group">
                <input type="text" id="codename" placeholder=" " required>
                <label for="codename">Agent Codename</label>
            </div>
            <div class="input-group">
                <input type="email" id="email" placeholder=" " required>
                <label for="email">Neural Link</label>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder=" " required>
                <label for="password">Encryption Key</label>
            </div>

            <button type="submit" class="glitch-btn">[Initialize_Identity]</button>
        </form>

        <div class="mt-8 text-center">
            <a href="login.html" class="text-[9px] tracking-widest text-zinc-500 hover:text-cyan-400 transition">ALREADY HAVE CLEARANCE? [RE-AUTHENTICATE]</a>
        </div>

        <div class="mt-10 flex justify-between text-[8px] text-zinc-700 font-mono">
            <span>SYSTEM_V: 4.0.2.SIGMA</span>
            <span>SEC_LAYER: 128_BIT_RSA</span>
            <span>ENC: END-TO-END</span>
        </div>
    </div>
</body>
</html>
