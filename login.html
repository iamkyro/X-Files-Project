<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Files | Security Gate</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --cyan: #00ffff; }
        body {
            background-color: #050505;
            font-family: 'Space Grotesk', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }
        .matrix-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            z-index: -1;
            filter: blur(5px);
        }
        .gate-container {
            width: 90%;
            max-width: 450px;
            background: rgba(15, 15, 15, 0.95);
            border-top: 4px solid var(--cyan);
            padding: 2.5rem;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            position: relative;
        }
        .terminal-input {
            width: 100%;
            background: rgba(0, 255, 255, 0.05);
            border: none;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            padding: 0.75rem 0.5rem;
            color: var(--cyan);
            font-family: monospace;
            outline: none;
        }
        .glow-btn {
            background: var(--cyan);
            color: #000;
            width: 100%;
            padding: 1rem;
            font-weight: bold;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-top: 1.5rem;
            cursor: pointer;
        }
        .glow-btn:hover { background: #fff; box-shadow: 0 0 20px rgba(0, 255, 255, 0.6); }
    </style>
</head>
<body>
    <div class="fixed top-6 left-6 z-50">
        <a href="index.html" class="flex items-center gap-2 text-[10px] tracking-[0.3em] text-cyan-400/60 hover:text-cyan-400 transition-all group">
            <span class="border border-cyan-400/40 px-2 py-1 group-hover:border-cyan-400 group-hover:bg-cyan-400/10 font-mono">
                [ ESC_TO_MAIN ]
            </span>
        </a>
    </div>

    <div class="matrix-bg"></div>
    <div class="gate-container" id="gate">
        <div class="flex justify-between text-[9px] text-zinc-500 mb-8 font-mono tracking-widest">
            <span>NODE: X-F_TERMINAL_04</span>
            <span>SIGNAL: ENCRYPTED</span>
        </div>
        <h2 class="text-2xl font-bold text-cyan-400 mb-6 uppercase tracking-tighter">Security Gate: Identity Verification</h2>
        <form id="loginForm" class="space-y-6">
            <div class="space-y-1">
                <label class="text-[10px] uppercase tracking-[0.2em] text-cyan-500/60">Agent ID</label>
                <input type="text" class="terminal-input" placeholder="000-000000" required>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] uppercase tracking-[0.2em] text-cyan-500/60">Access Key</label>
                <input type="password" class="terminal-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="glow-btn">Initiate Uplink</button>
        </form>
        <div class="mt-8 text-center">
            <a href="register.html" class="text-[10px] tracking-[0.2em] text-cyan-400 hover:text-white transition">NEW AGENT? [REQUEST_ENLISTMENT]</a>
        </div>
    </div>
</body>
</html>
