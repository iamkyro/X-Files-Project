<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Files | New Agent Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --cyan: #00ffff; }
        body {
            background-color: #050505;
            font-family: 'Space Grotesk', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow-x: hidden;
        }
        .register-box {
            width: 90%;
            max-width: 480px;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(0, 255, 255, 0.1);
            padding: 2.5rem;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        /* Góc trang trí */
        .corner {
            position: absolute;
            width: 15px; height: 15px;
            border: 2px solid var(--cyan);
        }
        .corner-tl { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
        .corner-tr { top: -1px; right: -1px; border-left: 0; border-bottom: 0; }
        .corner-bl { bottom: -1px; left: -1px; border-right: 0; border-top: 0; }
        .corner-br { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }

        /* Sửa lỗi ô Input bị trắng */
        .input-group { position: relative; margin-bottom: 1.5rem; }
        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.2);
            color: var(--cyan);
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--cyan); background: rgba(0, 255, 255, 0.05); }
        .input-group label {
            position: absolute;
            left: 1rem; top: 50%;
            transform: translateY(-50%);
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            pointer-events: none;
            transition: 0.3s;
        }
        /* Hiệu ứng label bay lên khi nhập */
        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            top: -10px; left: 0.5rem; color: var(--cyan);
            background: #0a0a0a; padding: 0 0.5rem; font-size: 0.6rem;
        }

        .biometric-grid {
            height: 80px;
            background: repeating-linear-gradient(rgba(0,255,255,0.03) 0 1px, transparent 1px 10px),
                        repeating-linear-gradient(90deg, rgba(0,255,255,0.03) 0 1px, transparent 1px 10px);
            border: 1px solid rgba(0, 255, 255, 0.1);
            margin-bottom: 2rem;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--cyan); box-shadow: 0 0 10px var(--cyan);
            animation: scan 3s infinite linear;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        .glitch-btn {
            width: 100%; background: var(--cyan); color: #000;
            font-weight: bold; padding: 1rem;
            text-transform: uppercase; letter-spacing: 0.2em;
            cursor: pointer; transition: 0.3s;
        }
        .glitch-btn:hover { background: #fff; box-shadow: 0 0 20px rgba(0, 255, 255, 0.5); }
    </style>
</head>
<body>
    <div class="register-box">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div class="text-center mb-8">
            <h2 class="text-xl font-bold text-white tracking-[0.2em] uppercase mb-1">New Agent Registration</h2>
            <p class="text-[8px] text-zinc-500 tracking-[0.2em] uppercase">Subject Status: Unidentified // Location: Encrypted</p>
        </div>

        <div class="biometric-grid">
            <div class="scan-line"></div>
            <span class="text-[8px] tracking-[0.3em] text-cyan-400/50 uppercase">Awaiting Biometric Feed...</span>
        </div>

        <form action="#" class="space-y-4">
            <div class="input-group">
                <input type="text" id="codename" placeholder=" " required>
                <label for="codename">Agent Codename</label>
            </div>
            <div class="input-group">
                <input type="email" id="email" placeholder=" " required>
                <label for="email">Neural Link</label>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder=" " required>
                <label for="password">Encryption Key</label>
            </div>
            <button type="submit" class="glitch-btn">[Initialize_Identity]</button>
        </form>

        <div class="mt-8 text-center">
            <a href="login.html" class="text-[9px] tracking-widest text-zinc-500 hover:text-cyan-400 transition">ALREADY HAVE CLEARANCE? [RE-AUTHENTICATE]</a>
        </div>

        <div class="mt-10 flex justify-between text-[7px] text-zinc-700 font-mono uppercase">
            <span>SYSTEM_V: 4.0.2.SIGMA</span>
            <span>ENC: END-TO-END</span>
        </div>
    </div>
</body>
</html>
